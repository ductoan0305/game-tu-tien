<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<title>Tân Thủ Thôn — Painted Scroll Preview (Phase 6)</title>
<style>
  html,body{margin:0;background:#1a100a;font-family:system-ui,sans-serif;color:#d8c8a8}
  header{padding:14px 18px;background:#0c0805;border-bottom:1px solid #3a2818}
  header h1{margin:0;font-size:15px;color:#e8c878;font-weight:600;letter-spacing:1px}
  header p{margin:4px 0 0;font-size:11px;color:#a89878}
  .selector{padding:10px 18px;background:#0c0805;border-bottom:1px solid #3a2818;display:flex;gap:8px;flex-wrap:wrap}
  .selector button{background:rgba(232,200,120,0.08);border:1px solid #5a3818;color:#d8c8a8;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px}
  .selector button.active{background:rgba(232,200,120,0.3);color:#fff;border-color:#d4a040}
  .wrap{padding:14px;display:flex;justify-content:center;gap:14px}
  .scene{width:760px;height:592px;display:flex;align-items:stretch;
    background:linear-gradient(135deg,#2a1a0c 0%,#1a100a 50%,#2a1a0c 100%);
    border:1px solid #3a2818;border-radius:8px;overflow:hidden;position:relative;
    box-shadow:inset 0 0 60px rgba(0,0,0,0.55)}
  .scene-frame{position:absolute;inset:10px;border-radius:10px;pointer-events:none;
    box-shadow:inset 0 0 0 1px rgba(212,160,64,0.22),inset 0 0 22px rgba(212,160,64,0.06),
    0 0 0 1px rgba(60,40,20,0.5);animation:bre 6s ease-in-out infinite}
  @keyframes bre{0%,100%{opacity:0.75}50%{opacity:1}}
  svg{width:100%;height:100%;display:block;flex:1}
  .znode{transition:filter .18s ease,transform .18s ease;transform-box:fill-box;transform-origin:center;cursor:pointer}
  .znode:not(.znode-locked):hover{filter:brightness(1.12) saturate(1.1);transform:translateY(-1px)}
  .znode.znode-locked{cursor:not-allowed}
  .sv-lingqi{mix-blend-mode:multiply}
</style>
</head>
<body>
<header>
  <h1>Tân Thủ Thôn — Painted Scroll (Phase 6 done)</h1>
  <p>4 thôn: Thanh Phong (xanh-herb) · Hỏa Diệm (đỏ-volcano) · Hàn Băng (lam-ice) · Lâm Hải (xanh-island). Click thôn để xem.</p>
</header>
<div class="selector" id="sel"></div>
<div class="wrap">
  <div class="scene">
    <div class="scene-frame"></div>
    <svg id="village-svg" viewBox="0 0 500 390" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
</div>

<script type="module">
import { STARTER_VILLAGES } from '../js/ui/location-popup.js';
import { svgZoneLocLabel } from '../js/ui/map-data.js';
import {
  MAP_DEFS, parchmentBackground, cloudBorder, vignette, agedSpots, renderStamp,
} from '../js/ui/map-defs.js';

const SV_VILLAGE_DECOR = {
  thanh_phong_thon: {
    inkGrad: 'trung', stampChar: '青', inkLight: '#0A4838',
    bgTint: 'rgba(140,180,120,0.40)',
    hero: [
      '<use href="#m-sym-forest" x="20" y="320" width="50" height="26" opacity="0.78"/>',
      '<use href="#m-sym-forest" x="80" y="335" width="44" height="22" opacity="0.72"/>',
      '<use href="#m-sym-mt-peak" x="380" y="58" width="32" height="28" opacity="0.65"/>',
      '<use href="#m-sym-mt-peak" x="410" y="70" width="28" height="24" opacity="0.60"/>',
      '<use href="#m-sym-herb" x="55" y="358" width="22" height="18" opacity="0.7"/>',
      '<use href="#m-sym-herb" x="430" y="358" width="22" height="18" opacity="0.7"/>',
    ],
  },
  hoa_diem_thon: {
    inkGrad: 'ma', stampChar: '炎', inkLight: '#5A0810',
    bgTint: 'rgba(200,120,80,0.40)',
    hero: [
      '<use href="#m-sym-volcano" x="40" y="55" width="50" height="60" opacity="0.78"/>',
      '<use href="#m-sym-mt-ridge" x="380" y="55" width="80" height="38" opacity="0.7"/>',
      '<use href="#m-sym-mt-peak" x="20" y="320" width="30" height="26" opacity="0.6"/>',
      '<use href="#m-sym-mt-peak" x="450" y="328" width="30" height="26" opacity="0.6"/>',
    ],
  },
  han_bang_thon: {
    inkGrad: 'chinh', stampChar: '寒', inkLight: '#3A5878',
    bgTint: 'rgba(170,195,215,0.40)',
    hero: [
      '<use href="#m-sym-mt-ridge" x="20" y="42" width="90" height="40" opacity="0.78"/>',
      '<use href="#m-sym-mt-peak" x="380" y="50" width="36" height="32" opacity="0.7"/>',
      '<use href="#m-sym-mt-peak" x="420" y="62" width="30" height="26" opacity="0.65"/>',
      '<use href="#m-sym-cave" x="20" y="325" width="36" height="28" opacity="0.65"/>',
      '<use href="#m-sym-cave" x="450" y="335" width="32" height="24" opacity="0.6"/>',
    ],
  },
  lam_hai_thon: {
    inkGrad: 'gold', stampChar: '泽', inkLight: '#604008',
    bgTint: 'rgba(130,180,200,0.42)',
    hero: [
      '<use href="#m-sym-island" x="20" y="335" width="40" height="22" opacity="0.78"/>',
      '<use href="#m-sym-island" x="430" y="345" width="44" height="22" opacity="0.78"/>',
      '<use href="#m-sym-forest" x="80" y="60" width="44" height="22" opacity="0.65"/>',
      '<use href="#m-sym-forest" x="380" y="55" width="44" height="22" opacity="0.65"/>',
      '<use href="#m-sym-herb" x="60" y="360" width="22" height="18" opacity="0.7"/>',
    ],
  },
};

const SV_LOC_TYPE_SYMBOL = {
  npc:         'm-sym-person',
  market:      'm-sym-market',
  hunt_zone:   'm-sym-swords',
  gather_zone: 'm-sym-herb',
  exit:        'm-sym-gate',
};

function symBox(type) {
  if (type === 'market')      return { w:36, h:28, yOff:14 };
  if (type === 'exit')        return { w:32, h:28, yOff:14 };
  if (type === 'npc')         return { w:22, h:26, yOff:13 };
  if (type === 'hunt_zone')   return { w:28, h:28, yOff:14 };
  if (type === 'gather_zone') return { w:26, h:24, yOff:12 };
  return { w:28, h:28, yOff:14 };
}

function pathLinks(locs) {
  const cx = 250, cy = 218;
  return locs.map(loc => {
    const mx = (cx + loc.x) / 2 + (loc.y - cy) * 0.06;
    const my = (cy + loc.y) / 2 - (loc.x - cx) * 0.04;
    return `<path d="M${cx},${cy} Q${mx},${my} ${loc.x},${loc.y}" fill="none" stroke="#7A5018" stroke-opacity="0.45" stroke-width="0.9" stroke-dasharray="2.5,3.5"/>`;
  }).join('');
}

const LINGQI_PTS = [
  [72, 88], [428, 95], [250, 155], [118, 228], [382, 242],
  [250, 318], [190, 118], [310, 128], [95, 300], [405, 305],
  [250, 52], [48, 195], [452, 188], [165, 68], [335, 72],
];

function lingQi(accent) {
  return LINGQI_PTS.map(([x, y], i) => {
    const r = 1.1 + (i % 4) * 0.35;
    const dur = 9 + (i % 5) * 1.4;
    const yf = y + (i % 2 === 0 ? -10 : 8);
    return `<circle cx="${x}" cy="${y}" r="${r}" fill="${accent}" opacity="0">
      <animate attributeName="opacity" values="0;0.32;0.12;0.25;0;0.18;0" dur="${dur}s" repeatCount="indefinite" begin="${i*0.35}s"/>
      <animate attributeName="cy" values="${y};${yf};${y+4};${y}" dur="${dur+3}s" repeatCount="indefinite" begin="${i*0.2}s"/>
    </circle>`;
  }).join('');
}

function build(village) {
  const decor = SV_VILLAGE_DECOR[village.id];
  const vid = village.id;
  const tint = `<rect width="500" height="390" fill="${decor.bgTint}" opacity="0.6" pointer-events="none"/>`;
  const heroSvg = decor.hero.map(s => s.replace(/<use/, '<use pointer-events="none"')).join('');

  const locSvg = village.locations.map(loc => {
    const isExit = loc.type === 'exit';
    const symId = SV_LOC_TYPE_SYMBOL[loc.type] || 'm-sym-altar';
    const box = symBox(loc.type);
    const shadow = `<ellipse cx="${loc.x}" cy="${loc.y + box.yOff - 2}" rx="${box.w/2 - 2}" ry="2.5" fill="#3A2818" opacity="0.32"/>`;
    const labelFill = isExit ? '#A86018' : decor.inkLight;
    return (
      `<g class="znode" data-lid="${loc.id}">` +
        shadow +
        `<use href="#${symId}" x="${loc.x - box.w/2}" y="${loc.y - box.yOff}" width="${box.w}" height="${box.h}"/>` +
        svgZoneLocLabel(loc.name, loc.x, loc.y + box.yOff + 12, { fill: labelFill, fontSize: 9 }) +
      `</g>`
    );
  }).join('');

  const stamp = `<g pointer-events="none">` +
    renderStamp({ x: 36, y: 30, chName: decor.stampChar, inkGrad: decor.inkGrad, size: 14, name: vid }) +
    `<text x="60" y="22" font-size="10.5" fill="${decor.inkLight}" letter-spacing="2" font-family="'Noto Serif SC','STSong',serif" font-weight="600" filter="url(#m-filt-label)">${village.name}</text>` +
    `<text x="60" y="38" font-size="8.5" fill="${decor.inkLight}" opacity="0.85" letter-spacing="1.5">Tân thủ · An cư</text>` +
  `</g>`;

  return MAP_DEFS + parchmentBackground(500,390) + agedSpots(500,390) + tint + heroSvg +
    `<g class="sv-lingqi" pointer-events="none">${lingQi(village.color)}</g>` +
    `<g class="sv-links" pointer-events="none">${pathLinks(village.locations)}</g>` +
    locSvg + cloudBorder(500,390,true,'sv-cloud') + vignette(500,390) + stamp;
}

function show(vid) {
  const v = STARTER_VILLAGES.find(x => x.id === vid);
  document.getElementById('village-svg').innerHTML = build(v);
  document.querySelectorAll('#sel button').forEach(b => b.classList.toggle('active', b.dataset.vid === vid));
}

document.getElementById('sel').innerHTML = STARTER_VILLAGES
  .map(v => `<button data-vid="${v.id}">${v.name}</button>`).join('');
document.querySelectorAll('#sel button').forEach(b => {
  b.addEventListener('click', () => show(b.dataset.vid));
});
show(STARTER_VILLAGES[0].id);
</script>
</body>
</html>
