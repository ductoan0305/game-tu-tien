<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- PWA manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- iOS fullscreen (Add to Home Screen) -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tu Tiên" />

  <!-- Android / Chrome -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0a0a14" />
  <!-- Firebase SDK via importmap -->
  <script type="importmap">
  {
    "imports": {
      "firebase/app":       "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js",
      "firebase/auth":      "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js"
    }
  }
  </script>
  <title>Tu Tiên — Phàm Nhân Giới</title>
  <!-- CSS Modules — tách riêng để dễ bảo trì -->
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/tabs.css" />
  <link rel="stylesheet" href="css/setup.css" />
  <link rel="stylesheet" href="css/equipment.css" />
  <link rel="stylesheet" href="css/combat.css" />
  <link rel="stylesheet" href="css/dungeon_sect.css" />
  <link rel="stylesheet" href="css/systems.css" />
  <link rel="stylesheet" href="css/map.css" />
  <link rel="stylesheet" href="css/tutorial.css" />
  <link rel="stylesheet" href="css/craft-popup.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧘</text></svg>" />
</head>
<body>

<!-- ==================== SETUP SCREEN ==================== -->
<div id="setup-container" style="display:none">
  <!-- Được render bởi ui/setup-screen.js -->
</div>

<!-- ==================== GAME UI ==================== -->
<div id="game-container" style="display:none">

  <!-- ========== MAIN GAME LAYOUT ========== -->
  <div class="game-layout">

    <!-- ===== LEFT PANEL — Character Info Only ===== -->
    <aside class="panel-left">
      <!-- Character card — click to open popup -->
      <div class="left-char" id="btn-char-popup" style="cursor:pointer" title="Xem thông tin nhân vật">
        <div id="char-portrait" class="char-portrait-wrap"></div>
        <div class="char-info-compact">
          <div id="hdr-name" class="char-name-compact">Vô Danh</div>
          <div id="hdr-realm" class="char-realm-compact">🧘 Luyện Khí · Tầng 1</div>
          <div id="hdr-title" class="char-title-compact" style="display:none"></div>
        </div>
      </div>

      <!-- Bars -->
      <div class="left-bars">
        <div class="lb-row">
          <span class="lb-label">⚡</span>
          <div id="bar-qi" class="lb-bar qi-bar"><div class="bar-fill"></div><span class="bar-text">0/100</span></div>
        </div>
        <div class="lb-row">
          <span class="lb-label">❤</span>
          <div id="bar-hp" class="lb-bar hp-bar"><div class="bar-fill"></div><span class="bar-text">100/100</span></div>
        </div>
        <div class="lb-row">
          <span class="lb-label">💪</span>
          <div id="bar-stamina" class="lb-bar stamina-bar"><div class="bar-fill"></div><span class="bar-text">100/100</span></div>
        </div>
        <div class="lb-row">
          <span class="lb-label">⏳</span>
          <div class="lb-bar lifespan-bar-wrap">
            <div id="lifespan-bar-fill" class="lifespan-bar-fill" style="width:100%;background:#56c46a"></div>
          </div>
          <span id="lifespan-text" class="lb-lifespan-text">--</span>
        </div>
      </div>

      <!-- Resources row — chỉ giữ tuổi, stone/exp chuyển vào popup nhân vật -->
      <div class="left-resources">
        <div class="lr-item"><span id="gametime-display" class="lr-time"></span></div>
        <div class="lr-item"><span id="hdr-danhvong" style="font-size:11px;font-weight:600;display:none"></span></div>
      </div>

      <!-- Hidden elements for compatibility -->
      <div style="display:none">
        <span id="hdr-stone"></span>
        <span id="hdr-exp"></span>
      </div>

      <!-- Pháp Địa + Công Pháp -->
      <div class="left-phapdia" id="stat-phapdia-left">--</div>

      <!-- Quick action buttons -->
      <div class="left-quick-btns">
        <button id="btn-notif-bell" class="lq-btn" title="Thông Báo" style="position:relative">🔔<span id="notif-badge"></span></button>
        <button id="btn-menu-icon" class="lq-btn" title="Menu">⚙</button>
        <button id="btn-guide-icon" class="lq-btn" title="Cẩm Nang">📖</button>
      </div>

      <!-- Hidden elements kept for compatibility -->
      <div style="display:none">
        <span id="hdr-title-left"></span>
        <strong id="stat-rate">0</strong>
        <strong id="stat-atk">0</strong>
        <strong id="stat-def">0</strong>
        <strong id="stat-maxhp">0</strong>
        <strong id="stat-time">0:00:00</strong>
        <span id="stat-stage-name"></span>
        <span id="stat-phapdia"></span>
        <span id="stat-hunger"></span>
        <span id="stat-am-thuong"></span>
      </div>

      <!-- Menu dropdown -->
      <div class="menu-dropdown-left" id="menu-dropdown" style="display:none">
        <button class="menu-item" id="menu-save">💾 Lưu Game</button>
        <div class="menu-divider"></div>
        <button class="menu-item" id="menu-account">👤 Tài Khoản</button>
        <div class="menu-divider"></div>
        <button class="menu-item" id="menu-guide">📖 Cẩm Nang Tu Tiên</button>
        <div class="menu-divider"></div>
        <button class="menu-item menu-item-danger" id="menu-reset">🔄 Chơi Lại Từ Đầu</button>
      </div>
    </aside>

    <!-- ===== CENTER — World Scene ===== -->
    <main class="panel-center">
      <!-- Mobile only: compact char bar thay thế panel trái -->
      <div class="mobile-char-bar" id="mobile-char-bar">
        <div style="flex:1;min-width:0">
          <div class="mcb-name" id="mcb-name">Vô Danh</div>
          <div class="mcb-realm" id="mcb-realm">🧘 Luyện Khí · Tầng 1</div>
        </div>
        <div class="mcb-bars">
          <div title="Linh Lực"><div class="mcb-bar"><div class="mcb-bar-fill" id="mcb-qi" style="background:#4a9eff;width:0%"></div></div></div>
          <div title="HP"><div class="mcb-bar"><div class="mcb-bar-fill" id="mcb-hp" style="background:#e06060;width:100%"></div></div></div>
          <div title="Thể Năng"><div class="mcb-bar"><div class="mcb-bar-fill" id="mcb-stamina" style="background:#60c060;width:100%"></div></div></div>
        </div>
        <span style="font-size:20px;color:var(--text-dim);margin-left:6px">👤</span>
      </div>
      <div id="combat-banner" class="combat-banner" style="display:none"></div>
      <div id="active-buffs" class="active-buffs-center"></div>

      <!-- Cultivate tab giữ nguyên HTML, các tab khác render bởi JS -->
      <div id="panel-cultivate" class="center-panel map-panel">
        <!-- Rendered by world-map.js -->
        <!-- Hidden elements needed by other systems -->
        <div style="display:none">
          <button id="btn-breakthrough"></button>
          <button id="btn-meditate"></button>
          <button id="btn-rest"></button>
          <button id="btn-explore"></button>
          <button id="btn-fish"></button>
          <button id="btn-array"></button>
          <button id="btn-spar"></button>
          <button id="btn-meditation"></button>
          <div id="title-panel"></div>
        </div>
      </div>

      <div id="panel-combat"    class="center-panel" style="display:none"></div>
      <div id="panel-alchemy"   class="center-panel" style="display:none"></div>
      <div id="panel-quests"    class="center-panel" style="display:none"></div>
      <div id="panel-skills"    class="center-panel" style="display:none"></div>
      <div id="panel-inventory" class="center-panel" style="display:none"></div>
      <div id="panel-shop"      class="center-panel" style="display:none"></div>
      <div id="panel-ranking"   class="center-panel" style="display:none"></div>
      <div id="panel-equipment" class="center-panel" style="display:none"></div>
      <div id="panel-dungeon"   class="center-panel" style="display:none"></div>
      <div id="panel-sect"      class="center-panel" style="display:none"></div>
      <div id="panel-passive"   class="center-panel" style="display:none"></div>
      <div id="panel-phapdia"   class="center-panel" style="display:none"></div>
      <div id="panel-nghe_nghiep" class="center-panel" style="display:none"></div>
      <!-- Nghề Nghiệp panels -->
      <div id="panel-tran_phap"  class="center-panel" style="display:none"></div>
      <div id="panel-phu_chu"    class="center-panel" style="display:none"></div>
      <div id="panel-khoi_loi"   class="center-panel" style="display:none"></div>
      <div id="panel-linh_thuc"  class="center-panel" style="display:none"></div>
      <div id="panel-linh_thu"   class="center-panel" style="display:none"></div>
    </main>

    <!-- ===== RIGHT PANEL — Log & Quick Info ===== -->
    <aside class="panel-right">
      <div class="right-section">
        <div class="right-title">⏳ Thọ Mệnh</div>
        <div class="lifespan-display" id="lifespan-display-right">
          <div class="ld-year" id="ld-year">--</div>
          <div class="ld-bar-wrap">
            <div id="lifespan-bar-fill-right" class="lifespan-bar-fill" style="width:100%;background:#56c46a"></div>
          </div>
          <div class="ld-remaining" id="ld-remaining">--</div>
        </div>
        <!-- Thời gian chơi -->
        <div class="playtime-display">
          <div class="pt-row">
            <span class="pt-label">🕐 Thực tế</span>
            <span class="pt-value" id="pt-real">--</span>
          </div>
          <div class="pt-row">
            <span class="pt-label">📅 Trong game</span>
            <span class="pt-value" id="pt-game">--</span>
          </div>
        </div>
      </div>

      <div class="right-section">
        <div class="right-title">📖 Ký Sự Gần Đây</div>
        <div id="chronicle-preview" class="chronicle-preview"></div>
      </div>

      <div class="right-section">
        <div class="right-title">📋 Nhật Ký Hành Động</div>
        <div id="action-log" class="action-log-right"></div>
      </div>
    </aside>

  </div><!-- end .game-layout -->

  <!-- ========== BOTTOM NAV ========== -->
  <nav class="bottom-nav" id="bottom-nav">
    <button class="bnav-btn active" data-tab="cultivate">
      <span class="bnav-icon">🗺</span>
      <span class="bnav-label">Bản Đồ</span>
    </button>
    <button class="bnav-btn" data-tab="quests">
      <span class="bnav-icon">📜</span>
      <span class="bnav-label">Nhiệm Vụ</span>
    </button>
    <button class="bnav-btn" data-tab="nghe_nghiep">
      <span class="bnav-icon">🛠</span>
      <span class="bnav-label">Nghề Nghiệp</span>
    </button>
    <button class="bnav-btn" data-tab="inventory">
      <span class="bnav-icon">🎒</span>
      <span class="bnav-label">Túi Đồ</span>
    </button>
    <button class="bnav-btn bnav-more" id="bnav-more-btn">
      <span class="bnav-icon">⋯</span>
      <span class="bnav-label">Thêm</span>
    </button>
  </nav>

  <!-- Bottom nav "Thêm" dropdown -->
  <div class="bnav-more-panel" id="bnav-more-panel" style="display:none">
    <div class="bmp-grid">
      <button class="bmp-btn" data-tab="combat"><span>⚔</span>Chiến Đấu</button>
      <button class="bmp-btn" data-tab="dungeon"><span>☠</span>Địa Phủ</button>
      <button class="bmp-btn" data-tab="sect"><span>🏯</span>Tông Môn</button>
      <button class="bmp-btn" data-tab="passive"><span>✧</span>Thiên Phú</button>
      <button class="bmp-btn" data-tab="equipment"><span>🗡</span>Trang Bị</button>
      <button class="bmp-btn" data-tab="skills"><span>✦</span>Kỹ Năng</button>
      <button class="bmp-btn" data-tab="phapdia"><span>🏔</span>Pháp Địa</button>
      <button class="bmp-btn" data-tab="shop"><span>🏮</span>Cửa Hàng</button>
      <button class="bmp-btn" data-tab="ranking"><span>🏆</span>Xếp Hạng</button>
      <button class="bmp-btn" data-tab="linh_thu"><span>🐾</span>Linh Thú</button>
    </div>
  </div>

  <!-- TOAST & FLOAT -->
  <div id="toast-container" class="toast-container"></div>
  <div id="float-container" class="float-container"></div>

  <!-- OFFLINE MODAL -->
  <div id="modal-offline" class="modal-overlay" style="display:none">
    <div class="modal-content"></div>
  </div>

</div><!-- end #game-container -->

<script type="module" src="js/main.js"></script>

<!-- Rotate overlay — hiện khi mobile portrait -->
<div id="rotate-overlay">
  <div class="rotate-content">
    <div class="rotate-phone">📱</div>
    <div class="rotate-arrow">↻</div>
    <div class="rotate-title">Xoay Điện Thoại</div>
    <div class="rotate-desc">Game này cần màn hình ngang để hiển thị tốt nhất</div>
  </div>
</div>
</body>
</html>
